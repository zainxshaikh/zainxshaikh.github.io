<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKU AI Club Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        #chatbox {
            width: 100%;
            max-width: 500px;
            height: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 15px;
            overflow-y: auto;
            margin: 0 auto;
        }
        .message {
            text-align: left;
            margin: 10px 0;
        }
        .user {
            font-weight: bold;
            color: blue;
        }
        .bot {
            font-weight: bold;
            color: green;
        }
        #input-box {
            width: 80%;
            padding: 10px;
            margin-top: 10px;
        }
        #send-btn {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>KKU AI Club Chatbot</h2>
    <div id="chatbox"></div>
    
    <input type="text" id="input-box" placeholder="Type a message..." />
    <button id="send-btn">Send</button>

    <script>
        document.getElementById("send-btn").addEventListener("click", sendMessage);

        async function sendMessage() {
            let userInput = document.getElementById("input-box").value;
            if (!userInput) return;
            
            let chatbox = document.getElementById("chatbox");
            chatbox.innerHTML += `<div class="message user">You: ${userInput}</div>`;
            document.getElementById("input-box").value = "";

            // Send request to backend
            let response = await fetch("https://your-backend-url/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: userInput })
            });

            let data = await response.json();
            chatbox.innerHTML += `<div class="message bot">Bot: ${data.response}</div>`;

            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>

</body>
</html>
