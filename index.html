<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKU AI Club Chatbot</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent unnecessary scrolling */
        }
        #chatbot-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            min-height: 500px; /* Ensures usability on small screens */
        }
        @media (max-width: 768px) {
            iframe {
                height: calc(100vh - 60px); /* Adjust for mobile browsers */
            }
        }
    </style>
</head>
<body>
    <div id="chatbot-container">
        <iframe src="https://app.thinkstack.ai/bot/index.html?chatbot_id=67b8b3af53d21a54788e4841&type=inline">
        </iframe>
    </div>
</body>
</html>
