<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKU AI Club Chatbot</title>

    <style>
        /* Ensure the chatbot is fully visible and responsive */
        #chatbot-container {
            width: 100vw !important;
            height: 90vh !important;
            max-width: 100%;
            max-height: 100%;
            position: fixed; /* Sticks it to the bottom */
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000; /* Keeps it on top */
        }

        @media (max-width: 768px) {
            #chatbot-container {
                height: 80vh !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <h1>Welcome to the KKU AI Club Chatbot</h1>

    <!-- Thinkstack AI Chatbot -->
    <div id="chatbot-container">
        <iframe
            src="https://app.thinkstack.ai/bot/index.html?chatbot_id=67b8b3af53d21a54788e4841&type=inline"
            frameborder="0"
            width="100%"
            height="100%"
            style="min-height: 500px;">
        </iframe>
    </div>

</body>
</html>
